<!DOCTYPE html>
<html lang="en-CA" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking Confirmed | Black Maple Ink</title>
  <meta name="description" content="Your Black Maple Ink deposit payment status and appointment confirmation.">
  <meta name="robots" content="noindex, follow">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/tailwind-config.js"></script>
  <script src="https://code.iconify.design/3/3.1.1/iconify.min.js" defer></script>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="bg-ink-950 text-white font-sans antialiased" data-page="booking" data-root="/">
  <div id="site-nav"></div>

  <main id="main" class="min-h-[70vh] flex items-center py-28">
    <div class="max-w-lg mx-auto px-5 sm:px-6 w-full">
      <div class="glass-card rounded-2xl p-8 md:p-12 text-center border-gold-400/10">
        <div id="successIcon" class="hidden w-16 h-16 rounded-full bg-gold-400/20 flex items-center justify-center mx-auto mb-6">
          <span class="iconify text-3xl text-gold-400" data-icon="lucide:check" aria-hidden="true"></span>
        </div>
        <h1 id="verifyStatus" class="font-serif text-2xl md:text-3xl font-semibold mb-4">Confirming your booking…</h1>
        <div id="verifyDetail" class="text-ink-400 font-light text-sm leading-relaxed"></div>
        <p class="text-xs text-ink-600 mt-6">Payment ref: <span id="bookingRef" class="text-ink-400">—</span></p>
        <div class="mt-10 flex flex-col sm:flex-row gap-3 justify-center">
          <a href="/index.html" class="btn-outline-gold px-6 py-3 rounded-full text-[12px] tracking-luxury uppercase">Home</a>
          <a href="/booking.html" class="btn-gold px-6 py-3 rounded-full text-[12px] tracking-luxury uppercase">Book another</a>
        </div>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>
  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/main.js"></script>
  <script src="/js/booking-success.js"></script>
</body>
</html>
